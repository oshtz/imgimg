name: Build Release Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm run check:versions
      - name: Verify tag matches application version
        if: github.ref_type == 'tag'
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
      - run: npm run build
      - run: npm run test:coverage
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets
      - run: npm audit --audit-level=high
      - run: npm audit --prefix web --audit-level=high
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

  windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm ci --prefix web
      - name: Build Windows application
        run: npx tauri build --no-bundle
      - name: Install pinned Enigma Virtual Box
        shell: pwsh
        run: |
          $url = 'https://www.enigmaprotector.com/assets/files/enigmavb.exe'
          $expectedHash = 'ab743f5e3dd927a288e126bbb053d367f270592e89378c9a06b7f3b15fa1ee35'
          $installer = Join-Path $env:RUNNER_TEMP 'enigmavb-setup.exe'
          & curl.exe --fail --location --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 300 --output $installer $url
          if ($LASTEXITCODE -ne 0) { throw 'Failed to download Enigma Virtual Box.' }
          $actualHash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) { throw "Enigma installer hash mismatch: $actualHash" }
          $process = Start-Process $installer -ArgumentList '/VERYSILENT','/NORESTART' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Enigma installer failed: $($process.ExitCode)" }
          if (-not (Test-Path 'C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe')) {
            throw 'enigmavbconsole.exe was not installed.'
          }
      - name: Create unsigned portable executable
        shell: pwsh
        run: |
          $inputExe = Resolve-Path 'src-tauri\target\release\imgimg.exe'
          $releaseDir = New-Item -ItemType Directory -Force -Path 'release\windows'
          $outputExe = Join-Path $releaseDir.FullName 'imgimg-Portable.exe'
          $staging = New-Item -ItemType Directory -Force -Path 'evb-staging'

          $webviewDll = Get-ChildItem 'src-tauri\target\release' -Recurse -Filter WebView2Loader.dll |
            Where-Object { $_.FullName -match '\\out\\x64\\WebView2Loader\.dll$' } |
            Select-Object -First 1
          if (-not $webviewDll) { throw 'x64 WebView2Loader.dll was not found.' }
          Copy-Item $webviewDll.FullName $staging.FullName

          $iconDir = New-Item -ItemType Directory -Force -Path (Join-Path $staging.FullName 'icons')
          Copy-Item 'src-tauri\icons\icon.ico' $iconDir.FullName
          $workflowDir = New-Item -ItemType Directory -Force -Path (Join-Path $staging.FullName 'workflows')
          Copy-Item 'workflows\*.json' $workflowDir.FullName

          $project = Join-Path $PWD 'imgimg.evb'
          npx -y @insco/enigma-virtualbox@1.3.4 generate $staging.FullName --input $inputExe --output $outputExe --project-name $project
          if ($LASTEXITCODE -ne 0) { throw 'Failed to generate the Enigma project.' }
          & 'C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe' $project
          if ($LASTEXITCODE -ne 0) { throw 'Failed to build the portable executable.' }

          $file = Get-Item $outputExe
          $header = [IO.File]::ReadAllBytes($file.FullName)[0..1]
          if ($header[0] -ne 0x4d -or $header[1] -ne 0x5a) { throw 'Portable output is not a PE executable.' }
          if ($file.Length -lt 5MB) { throw "Portable output is unexpectedly small: $($file.Length) bytes" }
          Write-Host "Created unsigned portable executable: $([math]::Round($file.Length / 1MB, 2)) MB"
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: release/windows
          format: spdx-json
          output-file: release/windows/imgimg-windows.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Create Windows checksum manifest
        shell: pwsh
        run: |
          $files = Get-ChildItem 'release\windows' -File | Where-Object Name -ne 'SHA256SUMS-windows.txt'
          $lines = foreach ($file in $files) {
            "{0}  {1}" -f (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant(), $file.Name
          }
          $lines | Set-Content 'release\windows\SHA256SUMS-windows.txt'
      - uses: actions/upload-artifact@v4
        with:
          name: imgimg-windows
          path: release/windows/*

  macos:
    needs: validate
    runs-on: macos-15
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Apple signing and notarization secrets
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            test -n "${!name}" || { echo "::error::Missing $name"; exit 1; }
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm ci --prefix web
      - name: Import Apple signing certificate
        run: |
          keychain="$RUNNER_TEMP/imgimg-build.keychain-db"
          password=$(uuidgen)
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$password" "$keychain"
          security import "$RUNNER_TEMP/certificate.p12" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security default-keychain -s "$keychain"
          security find-identity -v -p codesigning "$keychain" | grep -q '1)'
          echo "BUILD_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
      - name: Verify notarization credentials
        run: |
          xcrun notarytool store-credentials imgimg-ci \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD"
      - name: Build signed and notarized Apple Silicon DMG
        run: npx tauri build --bundles dmg
      - name: Notarize and staple macOS DMG
        run: |
          dmg=$(find src-tauri/target/release/bundle/dmg -type f -name '*.dmg' -print -quit)
          test -n "$dmg"
          xcrun notarytool submit "$dmg" --keychain-profile imgimg-ci --wait
          xcrun stapler staple "$dmg"
      - name: Verify signature and notarization ticket
        run: |
          dmg=$(find src-tauri/target/release/bundle/dmg -type f -name '*.dmg' -print -quit)
          test -n "$dmg"
          mount_dir=$(mktemp -d)
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rmdir "$mount_dir" || true
          }
          trap cleanup EXIT
          hdiutil attach "$dmg" -readonly -nobrowse -mountpoint "$mount_dir"
          app=$(find "$mount_dir" -type d -name '*.app' -print -quit)
          test -n "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$dmg"
          mkdir -p release/macos
          cp "$dmg" release/macos/
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: release/macos
          format: spdx-json
          output-file: release/macos/imgimg-macos.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Create macOS checksum manifest
        run: |
          cd release/macos
          shasum -a 256 imgimg_*.dmg imgimg-macos.spdx.json > SHA256SUMS-macos.txt
      - uses: actions/upload-artifact@v4
        with:
          name: imgimg-macos
          path: release/macos/*
      - name: Remove temporary keychain
        if: always()
        run: |
          if [ -n "${BUILD_KEYCHAIN:-}" ]; then security delete-keychain "$BUILD_KEYCHAIN" || true; fi

  release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [validate, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage and checksum release assets
        run: |
          mkdir release-files
          while IFS= read -r -d '' file; do
            name=$(basename "$file")
            test ! -e "release-files/$name" || { echo "::error::Duplicate release asset: $name"; exit 1; }
            cp "$file" "release-files/$name"
          done < <(find artifacts -type f -print0)
          cd release-files
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            draft=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)
            test "$draft" = true || { echo "::error::Release $TAG is already published and will not be overwritten."; exit 1; }
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --draft --title "imgimg $TAG" --notes-file RELEASE_NOTES.md
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber release-files/*
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
