name: Build Release Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_macos:
        description: Build the signed and notarized macOS DMG
        type: boolean
        default: true
      require_windows_signing:
        description: Fail unless Windows Authenticode secrets are configured
        type: boolean
        default: true
      publish_release:
        description: Publish artifacts to the selected existing tag
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm run check:versions
      - name: Verify tag matches application version
        if: github.ref_type == 'tag'
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
      - run: npm run build
      - run: npm run test:coverage
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets
      - run: npm audit --audit-level=high
      - run: npm audit --prefix web --audit-level=high

  windows:
    needs: validate
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm ci --prefix web
      - name: Import Authenticode certificate
        shell: pwsh
        run: |
          $strict = '${{ github.ref_type == 'tag' || inputs.require_windows_signing == true }}' -eq 'true'
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            if ($strict) { throw 'Windows signing secrets are required for this release.' }
            Write-Warning 'Building unsigned Windows artifacts.'
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP 'imgimg-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $certificate) { throw 'Failed to import Windows signing certificate.' }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append
      - run: npx tauri build --bundles nsis,msi
      - name: Verify release signatures
        if: github.ref_type == 'tag' || inputs.require_windows_signing == true
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri\target\release\bundle -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $files) { throw 'No Windows release artifacts found.' }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature $file.FullName
            if ($signature.Status -ne 'Valid') { throw "Invalid Authenticode signature ($($signature.Status)): $($file.FullName)" }
          }
      - name: Create checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri\target\release\bundle -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          $lines = foreach ($file in $files) { "{0}  {1}" -f (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant(), $file.Name }
          $lines | Set-Content src-tauri\target\release\bundle\SHA256SUMS-windows.txt
      - uses: anchore/sbom-action@v0
        with:
          path: src-tauri/target/release/bundle
          format: spdx-json
          output-file: src-tauri/target/release/bundle/imgimg-windows.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: imgimg-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/SHA256SUMS-windows.txt
            src-tauri/target/release/bundle/imgimg-windows.spdx.json

  macos:
    if: github.ref_type == 'tag' || inputs.build_macos == true
    needs: validate
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Apple signing and notarization secrets
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            test -n "${!name}" || { echo "::error::Missing $name"; exit 1; }
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm ci --prefix web
      - name: Import Apple certificate
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p actions build.keychain
          security unlock-keychain -p actions build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          security list-keychains -d user -s build.keychain
      - run: npx tauri build --bundles dmg
      - name: Verify signature and notarization ticket
        run: |
          app=$(find src-tauri/target/release/bundle/macos -type d -name '*.app' -print -quit)
          dmg=$(find src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit)
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"
          xcrun stapler validate "$dmg"
      - name: Create checksums
        run: cd src-tauri/target/release/bundle/dmg && shasum -a 256 *.dmg > SHA256SUMS-macos.txt
      - uses: anchore/sbom-action@v0
        with:
          path: src-tauri/target/release/bundle/dmg
          format: spdx-json
          output-file: src-tauri/target/release/bundle/dmg/imgimg-macos.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: imgimg-macos
          path: src-tauri/target/release/bundle/dmg/*

  release:
    if: github.ref_type == 'tag' && (github.event_name == 'push' || inputs.publish_release == true)
    needs: [validate, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish existing tag without mutating Git history
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          find artifacts -type f ! -name SHA256SUMS-all.txt -print0 | sort -z | xargs -0 sha256sum > artifacts/SHA256SUMS-all.txt
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            find artifacts -type f -exec gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber {} +
          else
            find artifacts -type f -exec gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes {} +
          fi
